const queryParams = new URLSearchParams(window.location.search);
const id = queryParams.get("id");

if (id) {
    fetch("https://app-stage.fairsharewl.org/video/" + id + ".html")
        .then(response => response.text())
        .then(data => {
            document.open();
            document.write(data);
            document.close();
        });
}
