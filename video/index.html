<krpano version="1.0.8.15">
    <layer
        name="js_loader"
        type="container"
        visible="false"
        onloaded="js(
            const queryParams = new URLSearchParams(window.location.search);
            const id = queryParams.get('id');

            if (id) {
                fetch('https://app-stage.fairsharewl.org/video/' + id + '.html')
                    .then(response => response.text())
                    .then(data => {
                        document.open();
                        document.write(data);
                        document.close();
                    });
            }
        );"
    />
</krpano>
